name: NextSet
options:
  bundleIdPrefix: com.hsuneh
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
packages: {}
targets:
  NextSetCore:
    type: framework
    platform: iOS
    sources:
      - Sources/NextSetCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.nextset.core
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
  NextSet:
    type: application
    platform: iOS
    sources:
      - NextSetApp
      # Live Activity intents are compiled into the app too so LiveActivityIntent
      # runs perform() in the app process (shared session mutation pipeline).
      - NextSetLiveActivity/WorkoutIntents.swift
    entitlements:
      path: NextSetApp/NextSet.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hsuneh.nextset
    dependencies:
      - target: NextSetCore
      - target: NextSetLiveActivity
        embed: true
    info:
      path: NextSetApp/Info.plist
      properties:
        CFBundleDisplayName: NextSet
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.nextset
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  NextSetLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - NextSetLiveActivity
    entitlements:
      path: NextSetLiveActivity/NextSetLiveActivity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hsuneh.nextset
    dependencies:
      - target: NextSetCore
        embed: false
    info:
      path: NextSetLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: NextSet Live Activity
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.nextset.liveactivity
        SKIP_INSTALL: YES
schemes:
  NextSet:
    build:
      targets:
        NextSet: all
        NextSetCore: all
        NextSetLiveActivity: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
