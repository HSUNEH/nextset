name: DamSet
options:
  bundleIdPrefix: com.hsuneh
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    # Free personal team (iamsuntae@gmail.com); set 2026-07-08 for real-device
    # installs. App Group entitlements were removed on the same date — free
    # teams cannot register them, and the stores in DamSetCore fall back to
    # app-local containers, which the Live Activity flow tolerates because
    # LiveActivityIntent runs in the app process. Restore the entitlements
    # blocks (git log: search application-groups) if a paid team arrives.
    DEVELOPMENT_TEAM: BL626GZ9S8
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
packages: {}
targets:
  DamSetCore:
    type: framework
    platform: iOS
    sources:
      - Sources/DamSetCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.damset.core
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
  DamSet:
    type: application
    platform: iOS
    sources:
      - DamSetApp
      # Live Activity intents are compiled into the app too so LiveActivityIntent
      # runs perform() in the app process (shared session mutation pipeline).
      - DamSetLiveActivity/WorkoutIntents.swift
    dependencies:
      - target: DamSetCore
      - target: DamSetLiveActivity
        embed: true
    info:
      path: DamSetApp/Info.plist
      properties:
        CFBundleDisplayName: DamSet
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.damset
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  DamSetLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - DamSetLiveActivity
    dependencies:
      - target: DamSetCore
        embed: false
    info:
      path: DamSetLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: DamSet Live Activity
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hsuneh.damset.liveactivity
        SKIP_INSTALL: YES
schemes:
  DamSet:
    build:
      targets:
        DamSet: all
        DamSetCore: all
        DamSetLiveActivity: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
